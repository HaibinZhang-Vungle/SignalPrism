<text class="lbl" x="46" y="536" fill="#2c2c2a">appopen / US / admob / android — 33.8× — primary target; Phase 1B Trino queries confirmed price shape + device tier gaps</text>

<text class="lbl" x="30" y="624" fill="#52514e">CART finds feature-driven splits (avg_hbedsp_price thresholds). Drill-down finds business-readable segments (appopen/US/admob/android).</text>
<text class="lbl" x="30" y="638" fill="#52514e">Both are needed: CART says "why" (feature bottleneck), drill-down says "where" (which specific segment to target in Phase 1B).</text>
